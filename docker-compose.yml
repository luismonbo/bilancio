services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bilancio:bilancio@db:5432/bilancio
      LLM_BACKEND: ollama
      OLLAMA_URL: http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn bilancio.main:app --host 0.0.0.0 --port 8000 --reload"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bilancio
      POSTGRES_PASSWORD: bilancio
      POSTGRES_DB: bilancio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bilancio"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - llm

volumes:
  postgres_data:
  ollama_data:
